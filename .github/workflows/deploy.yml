name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Oracle server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 30s
          command_timeout: 30m
          script: |
            echo "== Cargando NVM =="
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            echo "== Entrando al proyecto =="
            cd ~/Tiyuy-frontend

            echo "== git pull =="
            time git pull origin main

            echo "== npm ci =="
            time npm ci

            echo "== npm run build =="
            time npm run build

            echo "== pm2 restart =="
            time pm2 restart tiyuy-frontend || pm2 start npm --name "tiyuy-frontend" -- start -- -p 3000

            echo "== pm2 save =="
            time pm2 save

            echo "== FIN =="